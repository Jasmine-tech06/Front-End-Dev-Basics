# =====================================================================
# EmployeeAutomation - Configuration
# =====================================================================
# baseUrl must point at the running React app (vite dev server default).
# Start the app first with: npm run dev   (from the Employee-mgmt folder)
baseUrl=http://localhost:5173

# Browser: chrome | firefox | edge
browser=chrome

# Run headless (true/false). Keep false to actually watch the flow.
headless=false

# Implicit/explicit wait timeout (seconds)
timeout=15

# ---------------------------------------------------------------------
# ADMIN credentials
# These are the real, hardcoded admin credentials from src/pages/Login.jsx
# (email.toLowerCase() === "admin@decornest.com" && password === "admin")
# ---------------------------------------------------------------------
admin.username=admin@decornest.com
admin.password=admin

# ---------------------------------------------------------------------
# EMPLOYEE credentials
# ---------------------------------------------------------------------
# Employee login in this app is validated against real records fetched
# from the live mockapi backend (src/services/employeeService.js), so
# there is no fixed "employee" test account to hardcode here.
#
# This framework handles that correctly WITHOUT inventing any locator
# or fake account: the AdminEmployeeManagementTest (05) adds a brand
# new employee through the real "Add Employee" form using a unique,
# timestamped email. Because the Add Employee form has no password
# field, Login.jsx's own fallback rule applies:
#     const expectedPassword = employee.password || "password";
# So the freshly created employee can always log in with password
# "password" - this is the app's actual default, not an assumption.
#
# The email created during the admin flow is shared in-memory (via
# SuiteState) with the Employee login test that runs later in the same
# browser session, so you don't need to fill anything in below.
#
# If you would rather log in as a specific, already-existing employee
# from your mockapi data, fill these in and the Employee tests will use
# them instead of the auto-created record.
employee.username=
employee.password=
